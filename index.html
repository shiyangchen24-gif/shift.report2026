<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>異常表與交接表</title>
<style>
  :root{
    --bg: #F6F6F4;
    --surface: #FFFFFF;
    --border: #E3E1DA;
    --text: #22262B;
    --text-soft: #6B7280;
    --abnormal: #B3390A;
    --abnormal-soft: #FBEAE2;
    --handover: #0F6E6A;
    --handover-soft: #E4F2F0;
    --shadow: 0 1px 2px rgba(20,20,20,0.04), 0 1px 8px rgba(20,20,20,0.04);
  }

  * { box-sizing: border-box; }

  body{
    margin:0;
    background: var(--bg);
    color: var(--text);
    font-family: "Noto Sans TC", "PingFang TC", "Microsoft JhengHei", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    -webkit-font-smoothing: antialiased;
  }

  header{
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 18px 24px 0 24px;
    position: sticky;
    top: 0;
    z-index: 10;
  }

  h1{
    font-size: 18px;
    font-weight: 700;
    letter-spacing: 0.02em;
    margin: 0 0 14px 0;
  }

  .tabs{
    display: flex;
    gap: 4px;
  }

  .tab{
    appearance: none;
    border: none;
    background: transparent;
    padding: 10px 18px;
    font-size: 14px;
    font-weight: 600;
    color: var(--text-soft);
    cursor: pointer;
    border-bottom: 3px solid transparent;
    display: flex;
    align-items: center;
    gap: 8px;
    transition: color .15s ease;
  }

  .tab .dot{
    width: 7px; height: 7px; border-radius: 50%;
    background: currentColor;
    opacity: .5;
  }

  .tab.active[data-type="abnormal"]{
    color: var(--abnormal);
    border-bottom-color: var(--abnormal);
  }
  .tab.active[data-type="handover"]{
    color: var(--handover);
    border-bottom-color: var(--handover);
  }
  .tab:not(.active):hover{ color: var(--text); }

  main{
    max-width: 980px;
    margin: 0 auto;
    padding: 24px;
  }

  .panel{ display: none; }
  .panel.active{ display: block; }

  .card{
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    box-shadow: var(--shadow);
    padding: 20px;
    margin-bottom: 20px;
    border-left: 4px solid var(--accent, #ccc);
  }

  .panel[data-type="abnormal"] .card{ --accent: var(--abnormal); }
  .panel[data-type="handover"] .card{ --accent: var(--handover); }

  .card h2{
    font-size: 13px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--text-soft);
    margin: 0 0 16px 0;
    font-weight: 700;
  }

  .form-grid{
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: 14px;
    align-items: end;
  }

  .field{ display: flex; flex-direction: column; gap: 6px; }
  .field.wide{ grid-column: 1 / -1; }

  label{
    font-size: 12.5px;
    font-weight: 600;
    color: var(--text-soft);
  }

  input[type="text"], input[type="date"], select, textarea{
    border: 1px solid var(--border);
    border-radius: 7px;
    padding: 9px 10px;
    font-size: 14px;
    font-family: inherit;
    background: #FCFCFB;
    color: var(--text);
    outline: none;
    transition: border-color .15s ease, background .15s ease;
  }

  input:focus, select:focus, textarea:focus{
    border-color: var(--accent);
    background: #fff;
  }

  textarea{ resize: vertical; min-height: 40px; }

  .btn{
    appearance: none;
    border: none;
    border-radius: 7px;
    padding: 10px 18px;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    transition: opacity .15s ease, transform .05s ease;
  }
  .btn:active{ transform: translateY(1px); }
  .btn-primary{ background: var(--accent); color: #fff; }
  .btn-primary:hover{ opacity: .9; }
  .btn-secondary{
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text);
  }
  .btn-secondary:hover{ border-color: var(--accent); color: var(--accent); }
  .btn-ghost{
    background: transparent;
    color: var(--text-soft);
    padding: 4px 8px;
    font-weight: 600;
    font-size: 13px;
  }
  .btn-ghost:hover{ color: var(--abnormal); }

  .table-toolbar{
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 10px;
  }

  .table-toolbar .status{
    font-size: 12.5px;
    color: var(--text-soft);
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .sync-dot{
    width: 7px; height: 7px; border-radius: 50%;
    background: #22c55e;
    display: inline-block;
  }
  .sync-dot.loading{ background: #d1d5db; animation: pulse 1s infinite; }
  @keyframes pulse{ 50%{ opacity: .3; } }

  table{
    width: 100%;
    border-collapse: collapse;
    background: var(--surface);
    font-size: 13.5px;
  }

  th, td{
    border: 1px solid #D8D6CF;
    padding: 9px 10px;
    text-align: left;
    vertical-align: top;
  }

  th{
    background: var(--accent-soft, #F2F2EF);
    font-weight: 700;
    color: var(--text);
    white-space: nowrap;
  }

  .panel[data-type="abnormal"] th{ background: var(--abnormal-soft); }
  .panel[data-type="handover"] th{ background: var(--handover-soft); }

  tbody tr:hover{ background: #FAFAF8; }

  .chip{
    display: inline-block;
    padding: 2px 9px;
    border-radius: 100px;
    font-size: 12px;
    font-weight: 700;
  }
  .chip.return{ background: #FDE8E8; color: #B3261E; }
  .chip.exchange{ background: #E7F0FE; color: #1D4ED8; }
  .chip.reaction{ background: #FEF3C7; color: #92400E; }
  .chip.restock{ background: #DCFCE7; color: #166534; }

  .empty-row td{
    text-align: center;
    color: var(--text-soft);
    padding: 24px;
    border: 1px solid #D8D6CF;
  }

  .col-del{ width: 36px; text-align: center; }

  .toast{
    position: fixed;
    bottom: 22px;
    left: 50%;
    transform: translateX(-50%) translateY(10px);
    background: #22262B;
    color: #fff;
    padding: 10px 18px;
    border-radius: 8px;
    font-size: 13.5px;
    opacity: 0;
    pointer-events: none;
    transition: opacity .2s ease, transform .2s ease;
    z-index: 100;
  }
  .toast.show{ opacity: 1; transform: translateX(-50%) translateY(0); }

  /* ---------- Print ---------- */
  @media print{
    header, .card, .table-toolbar, .btn, .col-del{ display: none !important; }
    body{ background: #fff; }
    main{ max-width: none; padding: 0; margin: 0; }
    .print-title{ display: block !important; }
    table{ font-size: 12px; }
    th, td{ border: 1px solid #000 !important; padding: 6px 8px; }
    th{ background: #eee !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
    .chip{ background: transparent !important; color: #000 !important; padding: 0; font-weight: 700; }
  }

  .print-title{
    display: none;
    font-size: 18px;
    font-weight: 700;
    margin: 0 0 4px 0;
  }
  .print-meta{
    display: none;
    font-size: 12px;
    color: #555;
    margin-bottom: 14px;
  }
  @media print{
    .print-meta{ display: block; }
  }
</style>
</head>
<body>

<header>
  <h1>異常表與交接表</h1>
  <div class="tabs">
    <button class="tab active" data-type="abnormal" onclick="switchTab('abnormal')">
      <span class="dot"></span>異常表
    </button>
    <button class="tab" data-type="handover" onclick="switchTab('handover')">
      <span class="dot"></span>交接表
    </button>
  </div>
</header>

<main>

  <!-- ============ 異常表 ============ -->
  <section class="panel active" data-type="abnormal">
    <div class="card">
      <h2>新增異常紀錄</h2>
      <form id="form-abnormal" class="form-grid" onsubmit="return false;">
        <div class="field">
          <label>日期</label>
          <input type="date" id="ab-date" required>
        </div>
        <div class="field">
          <label>車號</label>
          <input type="text" id="ab-carNo" placeholder="例：ABC-1234">
        </div>
        <div class="field">
          <label>店家</label>
          <input type="text" id="ab-store" placeholder="店家名稱" required>
        </div>
        <div class="field">
          <label>退 / 換貨</label>
          <select id="ab-exchangeType">
            <option value="退貨">退貨</option>
            <option value="換貨">換貨</option>
            <option value="反應">反應</option>
            <option value="補貨">補貨</option>
          </select>
        </div>
        <div class="field wide">
          <label>原因</label>
          <textarea id="ab-reason" placeholder="請描述異常原因"></textarea>
        </div>
        <div class="field">
          <button class="btn btn-primary" onclick="submitAbnormal()">新增紀錄</button>
        </div>
      </form>
    </div>

    <div class="print-title">異常表</div>
    <div class="print-meta" id="ab-print-meta"></div>

    <div class="table-toolbar">
      <span class="status"><span class="sync-dot" id="ab-sync-dot"></span><span id="ab-sync-text">已同步</span></span>
      <div>
        <button class="btn btn-secondary" onclick="printPanel('abnormal')">🖨 列印</button>
      </div>
    </div>

    <table>
      <thead>
        <tr>
          <th>日期</th><th>車號</th><th>店家</th><th>原因</th><th>退/換貨</th><th class="col-del"></th>
        </tr>
      </thead>
      <tbody id="ab-tbody">
        <tr class="empty-row"><td colspan="6">尚無資料</td></tr>
      </tbody>
    </table>
  </section>

  <!-- ============ 交接表 ============ -->
  <section class="panel" data-type="handover">
    <div class="card">
      <h2>新增交接事項</h2>
      <form id="form-handover" class="form-grid" onsubmit="return false;">
        <div class="field">
          <label>日期</label>
          <input type="date" id="ho-date" required>
        </div>
        <div class="field">
          <label>店家</label>
          <input type="text" id="ho-store" placeholder="店家名稱" required>
        </div>
        <div class="field wide">
          <label>交接事項</label>
          <textarea id="ho-content" placeholder="請描述交接事項"></textarea>
        </div>
        <div class="field">
          <button class="btn btn-primary" onclick="submitHandover()">新增紀錄</button>
        </div>
      </form>
    </div>

    <div class="print-title">交接表</div>
    <div class="print-meta" id="ho-print-meta"></div>

    <div class="table-toolbar">
      <span class="status"><span class="sync-dot" id="ho-sync-dot"></span><span id="ho-sync-text">已同步</span></span>
      <div>
        <button class="btn btn-secondary" onclick="printPanel('handover')">🖨 列印</button>
      </div>
    </div>

    <table>
      <thead>
        <tr>
          <th>日期</th><th>店家</th><th>交接事項</th><th class="col-del"></th>
        </tr>
      </thead>
      <tbody id="ho-tbody">
        <tr class="empty-row"><td colspan="4">尚無資料</td></tr>
      </tbody>
    </table>
  </section>

</main>

<div class="toast" id="toast"></div>

<script>
/* =========================================================
   請將下面這行換成你自己部署的 Google Apps Script 網址
   （部署 > 新增部署作業 > 網頁應用程式 之後取得的網址）
   ========================================================= */
const GAS_URL = "https://script.google.com/macros/s/AKfycbwi2fQVqRyMcMBbuM3801wyhMT_YCUv_EgIOpxYOmCYI9rHP5uvNmba0usY15nlRYHn8A/exec";

const POLL_INTERVAL = 8000; // 多裝置同步輪詢間隔（毫秒）
let pollTimer = null;

function switchTab(type){
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.type === type));
  document.querySelectorAll('.panel').forEach(p => p.classList.toggle('active', p.dataset.type === type));
}

function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

function setSyncState(type, state){
  // state: 'loading' | 'synced' | 'error'
  const dot = document.getElementById(type === 'abnormal' ? 'ab-sync-dot' : 'ho-sync-dot');
  const text = document.getElementById(type === 'abnormal' ? 'ab-sync-text' : 'ho-sync-text');
  dot.classList.toggle('loading', state === 'loading');
  dot.style.background = state === 'error' ? '#ef4444' : (state === 'loading' ? '' : '#22c55e');
  text.textContent = state === 'error' ? '同步失敗' : (state === 'loading' ? '同步中…' : '已同步');
}

async function apiGet(type){
  const url = `${GAS_URL}?action=list&type=${type}&_=${Date.now()}`;
  const res = await fetch(url, { method: 'GET' });
  const json = await res.json();
  if (!json.success) throw new Error(json.error || '讀取失敗');
  return json.data;
}

async function apiPost(payload){
  // 使用 text/plain 避免瀏覽器對 GAS 送出 CORS 預檢請求
  const res = await fetch(GAS_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
    body: JSON.stringify(payload)
  });
  const json = await res.json();
  if (!json.success) throw new Error(json.error || '寫入失敗');
  return json;
}

/* ---------------- 異常表 ---------------- */

async function submitAbnormal(){
  const data = {
    date: document.getElementById('ab-date').value,
    carNo: document.getElementById('ab-carNo').value.trim(),
    store: document.getElementById('ab-store').value.trim(),
    reason: document.getElementById('ab-reason').value.trim(),
    exchangeType: document.getElementById('ab-exchangeType').value
  };
  if (!data.date || !data.store){
    showToast('請填寫日期與店家');
    return;
  }
  try{
    setSyncState('abnormal', 'loading');
    await apiPost({ action: 'add', type: 'abnormal', data });
    document.getElementById('form-abnormal').reset();
    showToast('已新增異常紀錄');
    await refreshAbnormal();
  }catch(err){
    setSyncState('abnormal', 'error');
    showToast('新增失敗：' + err.message);
  }
}

async function deleteAbnormal(id){
  if (!confirm('確定要刪除這筆異常紀錄嗎？')) return;
  try{
    setSyncState('abnormal', 'loading');
    await apiPost({ action: 'delete', type: 'abnormal', id });
    await refreshAbnormal();
  }catch(err){
    setSyncState('abnormal', 'error');
    showToast('刪除失敗：' + err.message);
  }
}

function renderAbnormal(rows){
  const tbody = document.getElementById('ab-tbody');
  if (!rows || rows.length === 0){
    tbody.innerHTML = '<tr class="empty-row"><td colspan="6">尚無資料</td></tr>';
    return;
  }
  tbody.innerHTML = rows.map(r => `
    <tr>
      <td>${escapeHtml(r['日期'])}</td>
      <td>${escapeHtml(r['車號'])}</td>
      <td>${escapeHtml(r['店家'])}</td>
      <td>${escapeHtml(r['原因'])}</td>
      <td><span class="chip ${chipClass(r['退換貨'])}">${escapeHtml(r['退換貨'])}</span></td>
      <td class="col-del"><button class="btn btn-ghost" onclick="deleteAbnormal('${r['id']}')">✕</button></td>
    </tr>
  `).join('');
}

async function refreshAbnormal(){
  try{
    setSyncState('abnormal', 'loading');
    const rows = await apiGet('abnormal');
    renderAbnormal(rows);
    setSyncState('abnormal', 'synced');
    document.getElementById('ab-print-meta').textContent = `列印時間：${new Date().toLocaleString('zh-TW')}　共 ${rows.length} 筆`;
  }catch(err){
    setSyncState('abnormal', 'error');
  }
}

/* ---------------- 交接表 ---------------- */

async function submitHandover(){
  const data = {
    date: document.getElementById('ho-date').value,
    store: document.getElementById('ho-store').value.trim(),
    content: document.getElementById('ho-content').value.trim()
  };
  if (!data.date || !data.store){
    showToast('請填寫日期與店家');
    return;
  }
  try{
    setSyncState('handover', 'loading');
    await apiPost({ action: 'add', type: 'handover', data });
    document.getElementById('form-handover').reset();
    showToast('已新增交接紀錄');
    await refreshHandover();
  }catch(err){
    setSyncState('handover', 'error');
    showToast('新增失敗：' + err.message);
  }
}

async function deleteHandover(id){
  if (!confirm('確定要刪除這筆交接紀錄嗎？')) return;
  try{
    setSyncState('handover', 'loading');
    await apiPost({ action: 'delete', type: 'handover', id });
    await refreshHandover();
  }catch(err){
    setSyncState('handover', 'error');
    showToast('刪除失敗：' + err.message);
  }
}

function renderHandover(rows){
  const tbody = document.getElementById('ho-tbody');
  if (!rows || rows.length === 0){
    tbody.innerHTML = '<tr class="empty-row"><td colspan="4">尚無資料</td></tr>';
    return;
  }
  tbody.innerHTML = rows.map(r => `
    <tr>
      <td>${escapeHtml(r['日期'])}</td>
      <td>${escapeHtml(r['店家'])}</td>
      <td>${escapeHtml(r['交接事項'])}</td>
      <td class="col-del"><button class="btn btn-ghost" onclick="deleteHandover('${r['id']}')">✕</button></td>
    </tr>
  `).join('');
}

async function refreshHandover(){
  try{
    setSyncState('handover', 'loading');
    const rows = await apiGet('handover');
    renderHandover(rows);
    setSyncState('handover', 'synced');
    document.getElementById('ho-print-meta').textContent = `列印時間：${new Date().toLocaleString('zh-TW')}　共 ${rows.length} 筆`;
  }catch(err){
    setSyncState('handover', 'error');
  }
}

/* ---------------- 共用 ---------------- */

function chipClass(status){
  switch (status){
    case '換貨': return 'exchange';
    case '反應': return 'reaction';
    case '補貨': return 'restock';
    default: return 'return'; // 退貨
  }
}

function escapeHtml(v){
  if (v === undefined || v === null) return '';
  return String(v)
    .replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;')
    .replaceAll('"','&quot;').replaceAll("'",'&#39;');
}

function printPanel(type){
  // 印表前先更新一次列印時間戳記
  const meta = document.getElementById(type === 'abnormal' ? 'ab-print-meta' : 'ho-print-meta');
  meta.textContent = meta.textContent.replace(/列印時間：.*?　/, `列印時間：${new Date().toLocaleString('zh-TW')}　`);
  switchTab(type);
  setTimeout(() => window.print(), 50);
}

async function refreshAll(){
  await Promise.all([refreshAbnormal(), refreshHandover()]);
}

function startPolling(){
  if (pollTimer) clearInterval(pollTimer);
  pollTimer = setInterval(refreshAll, POLL_INTERVAL);
}

// 預設今天日期
document.getElementById('ab-date').valueAsDate = new Date();
document.getElementById('ho-date').valueAsDate = new Date();

refreshAll();
startPolling();
</script>

</body>
</html>
