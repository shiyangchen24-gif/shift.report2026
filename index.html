<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>異常表與交接表</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #F6F6F8;
    --surface: #FFFFFF;
    --surface-2: #EFEFF2;
    --border: #E3E3E8;
    --border-strong: #D2D2D9;
    --text: #16161A;
    --text-soft: #6D6D78;
    --text-faint: #A1A1AA;

    --abnormal: #E1123F;
    --abnormal-soft: #FDECF0;
    --abnormal-line: #F7C6D2;

    --handover: #2952E3;
    --handover-soft: #EAEFFD;
    --handover-line: #C4D0FA;

    --accent: var(--abnormal);
    --accent-soft: var(--abnormal-soft);
    --accent-line: var(--abnormal-line);

    --radius: 10px;
    --shadow-sm: 0 1px 2px rgba(15,15,20,0.05);
    --shadow-md: 0 4px 16px rgba(15,15,20,0.06), 0 1px 3px rgba(15,15,20,0.04);
  }

  * { box-sizing: border-box; }

  body{
    margin:0;
    background: var(--bg);
    color: var(--text);
    font-family: "Inter", "Noto Sans TC", "PingFang TC", "Microsoft JhengHei", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    -webkit-font-smoothing: antialiased;
    letter-spacing: -0.005em;
  }

  .mono{ font-family: "JetBrains Mono", ui-monospace, SFMono-Regular, monospace; }

  header{
    background: rgba(246,246,248,0.85);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    border-bottom: 1px solid var(--border);
    padding: 16px 28px;
    position: sticky;
    top: 0;
    z-index: 10;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 20px;
    flex-wrap: wrap;
  }

  .brand{
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .brand .mark{
    width: 26px; height: 26px;
    border-radius: 7px;
    background: linear-gradient(135deg, var(--abnormal), var(--handover));
    flex-shrink: 0;
  }

  .brand h1{
    font-size: 15.5px;
    font-weight: 700;
    letter-spacing: -0.01em;
    margin: 0;
    line-height: 1.2;
  }

  .brand .sub{
    font-size: 11.5px;
    color: var(--text-faint);
    font-weight: 500;
  }

  .tabs{
    display: inline-flex;
    gap: 2px;
    background: var(--surface-2);
    padding: 3px;
    border-radius: 9px;
    border: 1px solid var(--border);
  }

  .tab{
    appearance: none;
    border: none;
    background: transparent;
    padding: 7px 16px;
    font-size: 13.5px;
    font-weight: 600;
    color: var(--text-soft);
    cursor: pointer;
    border-radius: 6px;
    display: flex;
    align-items: center;
    gap: 7px;
    transition: color .15s ease, background .15s ease, box-shadow .15s ease;
  }

  .tab .dot{
    width: 6px; height: 6px; border-radius: 50%;
    background: currentColor;
    opacity: .55;
  }

  .tab.active{
    background: var(--surface);
    box-shadow: var(--shadow-sm);
  }
  .tab.active[data-type="abnormal"]{ color: var(--abnormal); }
  .tab.active[data-type="handover"]{ color: var(--handover); }
  .tab.active .dot{ opacity: 1; }
  .tab:not(.active):hover{ color: var(--text); }

  main{
    max-width: 1040px;
    margin: 0 auto;
    padding: 28px;
  }

  .panel{ display: none; }
  .panel.active{ display: block; animation: fadein .18s ease; }
  @keyframes fadein{ from{ opacity: 0; transform: translateY(2px);} to{ opacity: 1; transform: translateY(0);} }

  .panel[data-type="abnormal"]{ --accent: var(--abnormal); --accent-soft: var(--abnormal-soft); --accent-line: var(--abnormal-line); }
  .panel[data-type="handover"]{ --accent: var(--handover); --accent-soft: var(--handover-soft); --accent-line: var(--handover-line); }

  .card{
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    box-shadow: var(--shadow-sm);
    padding: 22px;
    margin-bottom: 22px;
  }

  .card h2{
    font-size: 13px;
    color: var(--text);
    margin: 0 0 18px 0;
    font-weight: 700;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .card h2::before{
    content: "";
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--accent);
  }

  .form-grid{
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: 16px;
    align-items: end;
  }

  .field{ display: flex; flex-direction: column; gap: 7px; }
  .field.wide{ grid-column: 1 / -1; }

  label{
    font-size: 12px;
    font-weight: 600;
    color: var(--text-soft);
  }

  input[type="text"], input[type="date"], select, textarea{
    border: 1px solid var(--border-strong);
    border-radius: 7px;
    padding: 9px 11px;
    font-size: 14px;
    font-family: inherit;
    background: var(--surface);
    color: var(--text);
    outline: none;
    transition: border-color .15s ease, box-shadow .15s ease;
  }

  input:focus, select:focus, textarea:focus{
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-soft);
  }

  textarea{ resize: vertical; min-height: 40px; }

  .btn{
    appearance: none;
    border: none;
    border-radius: 7px;
    padding: 9px 16px;
    font-size: 13.5px;
    font-weight: 600;
    cursor: pointer;
    transition: opacity .15s ease, background .15s ease, transform .05s ease, border-color .15s ease;
  }
  .btn:active{ transform: translateY(1px); }
  .btn-primary{ background: var(--accent); color: #fff; box-shadow: var(--shadow-sm); }
  .btn-primary:hover{ opacity: .92; }
  .btn-secondary{
    background: var(--surface);
    border: 1px solid var(--border-strong);
    color: var(--text);
  }
  .btn-secondary:hover{ border-color: var(--accent); color: var(--accent); }
  .btn-danger{
    background: transparent;
    border: 1px solid transparent;
    color: var(--abnormal);
    margin-right: 4px;
  }
  .btn-danger:hover{ background: var(--abnormal-soft); }
  .btn-ghost{
    background: transparent;
    color: var(--text-faint);
    padding: 4px 8px;
    font-weight: 600;
    font-size: 13px;
    border-radius: 5px;
  }
  .btn-ghost:hover{ color: var(--abnormal); background: var(--abnormal-soft); }

  .table-toolbar{
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 10px;
    gap: 12px;
    flex-wrap: wrap;
  }

  .table-toolbar .status{
    font-size: 12.5px;
    color: var(--text-faint);
    display: flex;
    align-items: center;
    gap: 6px;
    font-weight: 500;
  }

  .sync-dot{
    width: 6px; height: 6px; border-radius: 50%;
    background: #16a34a;
    display: inline-block;
  }
  .sync-dot.loading{ background: #d4d4d8; animation: pulse 1s infinite; }
  @keyframes pulse{ 50%{ opacity: .3; } }

  .table-wrap{
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    box-shadow: var(--shadow-sm);
  }

  table{
    width: 100%;
    border-collapse: collapse;
    font-size: 13.5px;
  }

  th, td{
    padding: 11px 14px;
    text-align: left;
    vertical-align: top;
    border-bottom: 1px solid var(--border);
  }

  th{
    font-size: 11.5px;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    font-weight: 700;
    color: var(--text-faint);
    white-space: nowrap;
    background: var(--surface);
    border-bottom: 1px solid var(--border-strong);
  }

  tbody tr{ transition: background .1s ease; }
  tbody tr:hover{ background: var(--surface-2); }
  tbody tr:last-child td{ border-bottom: none; }

  td.mono-cell{ font-family: "JetBrains Mono", ui-monospace, monospace; font-size: 12.5px; color: var(--text-soft); white-space: nowrap; }

  .chip{
    display: inline-flex;
    align-items: center;
    gap: 5px;
    padding: 3px 10px 3px 8px;
    border-radius: 100px;
    font-size: 12px;
    font-weight: 600;
    border: 1px solid transparent;
  }
  .chip::before{ content:""; width: 5px; height: 5px; border-radius: 50%; background: currentColor; }
  .chip.return{ background: #FDECF0; color: #C11448; border-color: #F7C6D2; }
  .chip.exchange{ background: #EAEFFD; color: #2952E3; border-color: #C4D0FA; }
  .chip.reaction{ background: #FEF6E7; color: #B4720A; border-color: #F5DFAD; }
  .chip.restock{ background: #EAFAF0; color: #0F8B4C; border-color: #BEEBD1; }

  .empty-row td{
    text-align: center;
    color: var(--text-faint);
    padding: 32px;
    border-bottom: none;
  }

  .col-del{ width: 36px; text-align: center; }

  .toast{
    position: fixed;
    bottom: 22px;
    left: 50%;
    transform: translateX(-50%) translateY(10px);
    background: var(--text);
    color: #fff;
    padding: 10px 18px;
    border-radius: 8px;
    font-size: 13.5px;
    font-weight: 500;
    opacity: 0;
    pointer-events: none;
    transition: opacity .2s ease, transform .2s ease;
    z-index: 100;
    box-shadow: var(--shadow-md);
  }
  .toast.show{ opacity: 1; transform: translateX(-50%) translateY(0); }

  /* ---------- Print ---------- */
  @media print{
    header, .card, .table-toolbar, .btn, .col-del{ display: none !important; }
    body{ background: #fff; }
    main{ max-width: none; padding: 0; margin: 0; }
    .table-wrap{ border: none; box-shadow: none; border-radius: 0; }
    .print-title{ display: block !important; }
    table{ font-size: 12px; }
    th, td{ border: 1px solid #000 !important; padding: 6px 8px; }
    th{ background: #eee !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
    .chip{ background: transparent !important; color: #000 !important; border: none !important; padding: 0; font-weight: 700; }
    .chip::before{ display: none; }
  }

  .print-title{
    display: none;
    font-size: 18px;
    font-weight: 700;
    margin: 0 0 4px 0;
  }
  .print-meta{
    display: none;
    font-size: 12px;
    color: #555;
    margin-bottom: 14px;
  }
  @media print{
    .print-meta{ display: block; }
  }

  @media (max-width: 640px){
    header{ padding: 14px 16px; }
    main{ padding: 16px; }
    .form-grid{ grid-template-columns: 1fr 1fr; }
  }
</style>
</head>
<body>

<header>
  <div class="brand">
    <span class="mark"></span>
    <div>
      <h1>異常表與交接表</h1>
      <div class="sub">多裝置即時同步</div>
    </div>
  </div>
  <div class="tabs">
    <button class="tab active" data-type="abnormal" onclick="switchTab('abnormal')">
      <span class="dot"></span>異常表
    </button>
    <button class="tab" data-type="handover" onclick="switchTab('handover')">
      <span class="dot"></span>交接表
    </button>
  </div>
</header>

<main>

  <!-- ============ 異常表 ============ -->
  <section class="panel active" data-type="abnormal">
    <div class="card">
      <h2>新增異常紀錄</h2>
      <form id="form-abnormal" class="form-grid" onsubmit="return false;">
        <div class="field">
          <label>日期</label>
          <input type="date" id="ab-date" required>
        </div>
        <div class="field">
          <label>車號</label>
          <input type="text" id="ab-carNo" placeholder="例：ABC-1234">
        </div>
        <div class="field">
          <label>店家</label>
          <input type="text" id="ab-store" placeholder="店家名稱" required>
        </div>
        <div class="field">
          <label>退 / 換貨</label>
          <select id="ab-exchangeType">
            <option value="退貨">退貨</option>
            <option value="換貨">換貨</option>
            <option value="反應">反應</option>
            <option value="補貨">補貨</option>
          </select>
        </div>
        <div class="field wide">
          <label>原因</label>
          <textarea id="ab-reason" placeholder="請描述異常原因"></textarea>
        </div>
        <div class="field">
          <button class="btn btn-primary" onclick="submitAbnormal()">新增紀錄</button>
        </div>
      </form>
    </div>

    <div class="print-title">異常表</div>
    <div class="print-meta" id="ab-print-meta"></div>

    <div class="table-toolbar">
      <span class="status"><span class="sync-dot" id="ab-sync-dot"></span><span id="ab-sync-text">已同步</span></span>
      <div>
        <button class="btn btn-danger" onclick="clearAll('abnormal')">🗑 刪除全部</button>
        <button class="btn btn-secondary" onclick="printPanel('abnormal')">🖨 列印</button>
      </div>
    </div>

    <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>日期</th><th>車號</th><th>店家</th><th>原因</th><th>退/換貨</th><th class="col-del"></th>
        </tr>
      </thead>
      <tbody id="ab-tbody">
        <tr class="empty-row"><td colspan="6">尚無資料</td></tr>
      </tbody>
    </table>
    </div>
  </section>

  <!-- ============ 交接表 ============ -->
  <section class="panel" data-type="handover">
    <div class="card">
      <h2>新增交接事項</h2>
      <form id="form-handover" class="form-grid" onsubmit="return false;">
        <div class="field">
          <label>日期</label>
          <input type="date" id="ho-date" required>
        </div>
        <div class="field">
          <label>店家</label>
          <input type="text" id="ho-store" placeholder="店家名稱" required>
        </div>
        <div class="field wide">
          <label>交接事項</label>
          <textarea id="ho-content" placeholder="請描述交接事項"></textarea>
        </div>
        <div class="field">
          <button class="btn btn-primary" onclick="submitHandover()">新增紀錄</button>
        </div>
      </form>
    </div>

    <div class="print-title">交接表</div>
    <div class="print-meta" id="ho-print-meta"></div>

    <div class="table-toolbar">
      <span class="status"><span class="sync-dot" id="ho-sync-dot"></span><span id="ho-sync-text">已同步</span></span>
      <div>
        <button class="btn btn-danger" onclick="clearAll('handover')">🗑 刪除全部</button>
        <button class="btn btn-secondary" onclick="printPanel('handover')">🖨 列印</button>
      </div>
    </div>

    <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>日期</th><th>店家</th><th>交接事項</th><th class="col-del"></th>
        </tr>
      </thead>
      <tbody id="ho-tbody">
        <tr class="empty-row"><td colspan="4">尚無資料</td></tr>
      </tbody>
    </table>
    </div>
  </section>

</main>

<div class="toast" id="toast"></div>

<script>
/* =========================================================
   請將下面這行換成你自己部署的 Google Apps Script 網址
   （部署 > 新增部署作業 > 網頁應用程式 之後取得的網址）
   ========================================================= */
const GAS_URL = "https://script.google.com/macros/s/AKfycbwi2fQVqRyMcMBbuM3801wyhMT_YCUv_EgIOpxYOmCYI9rHP5uvNmba0usY15nlRYHn8A/exec";

const POLL_INTERVAL = 8000; // 多裝置同步輪詢間隔（毫秒）
let pollTimer = null;

function switchTab(type){
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.type === type));
  document.querySelectorAll('.panel').forEach(p => p.classList.toggle('active', p.dataset.type === type));
}

function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

function setSyncState(type, state){
  // state: 'loading' | 'synced' | 'error'
  const dot = document.getElementById(type === 'abnormal' ? 'ab-sync-dot' : 'ho-sync-dot');
  const text = document.getElementById(type === 'abnormal' ? 'ab-sync-text' : 'ho-sync-text');
  dot.classList.toggle('loading', state === 'loading');
  dot.style.background = state === 'error' ? '#ef4444' : (state === 'loading' ? '' : '#22c55e');
  text.textContent = state === 'error' ? '同步失敗' : (state === 'loading' ? '同步中…' : '已同步');
}

async function apiGet(type){
  const url = `${GAS_URL}?action=list&type=${type}&_=${Date.now()}`;
  const res = await fetch(url, { method: 'GET' });
  const json = await res.json();
  if (!json.success) throw new Error(json.error || '讀取失敗');
  return json.data;
}

async function apiPost(payload){
  // 使用 text/plain 避免瀏覽器對 GAS 送出 CORS 預檢請求
  const res = await fetch(GAS_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
    body: JSON.stringify(payload)
  });
  const json = await res.json();
  if (!json.success) throw new Error(json.error || '寫入失敗');
  return json;
}

/* ---------------- 異常表 ---------------- */

async function submitAbnormal(){
  const data = {
    date: document.getElementById('ab-date').value,
    carNo: document.getElementById('ab-carNo').value.trim(),
    store: document.getElementById('ab-store').value.trim(),
    reason: document.getElementById('ab-reason').value.trim(),
    exchangeType: document.getElementById('ab-exchangeType').value
  };
  if (!data.date || !data.store){
    showToast('請填寫日期與店家');
    return;
  }
  try{
    setSyncState('abnormal', 'loading');
    await apiPost({ action: 'add', type: 'abnormal', data });
    document.getElementById('form-abnormal').reset();
    showToast('已新增異常紀錄');
    await refreshAbnormal();
  }catch(err){
    setSyncState('abnormal', 'error');
    showToast('新增失敗：' + err.message);
  }
}

async function deleteAbnormal(id){
  if (!confirm('確定要刪除這筆異常紀錄嗎？')) return;
  try{
    setSyncState('abnormal', 'loading');
    await apiPost({ action: 'delete', type: 'abnormal', id });
    await refreshAbnormal();
  }catch(err){
    setSyncState('abnormal', 'error');
    showToast('刪除失敗：' + err.message);
  }
}

function renderAbnormal(rows){
  const tbody = document.getElementById('ab-tbody');
  if (!rows || rows.length === 0){
    tbody.innerHTML = '<tr class="empty-row"><td colspan="6">尚無資料</td></tr>';
    return;
  }
  tbody.innerHTML = rows.map(r => `
    <tr>
      <td class="mono-cell">${escapeHtml(r['日期'])}</td>
      <td>${escapeHtml(r['車號'])}</td>
      <td>${escapeHtml(r['店家'])}</td>
      <td>${escapeHtml(r['原因'])}</td>
      <td><span class="chip ${chipClass(r['退換貨'])}">${escapeHtml(r['退換貨'])}</span></td>
      <td class="col-del"><button class="btn btn-ghost" onclick="deleteAbnormal('${r['id']}')">✕</button></td>
    </tr>
  `).join('');
}

async function refreshAbnormal(){
  try{
    setSyncState('abnormal', 'loading');
    const rows = await apiGet('abnormal');
    renderAbnormal(rows);
    setSyncState('abnormal', 'synced');
    document.getElementById('ab-print-meta').textContent = `列印時間：${new Date().toLocaleString('zh-TW')}　共 ${rows.length} 筆`;
  }catch(err){
    setSyncState('abnormal', 'error');
  }
}

/* ---------------- 交接表 ---------------- */

async function submitHandover(){
  const data = {
    date: document.getElementById('ho-date').value,
    store: document.getElementById('ho-store').value.trim(),
    content: document.getElementById('ho-content').value.trim()
  };
  if (!data.date || !data.store){
    showToast('請填寫日期與店家');
    return;
  }
  try{
    setSyncState('handover', 'loading');
    await apiPost({ action: 'add', type: 'handover', data });
    document.getElementById('form-handover').reset();
    showToast('已新增交接紀錄');
    await refreshHandover();
  }catch(err){
    setSyncState('handover', 'error');
    showToast('新增失敗：' + err.message);
  }
}

async function deleteHandover(id){
  if (!confirm('確定要刪除這筆交接紀錄嗎？')) return;
  try{
    setSyncState('handover', 'loading');
    await apiPost({ action: 'delete', type: 'handover', id });
    await refreshHandover();
  }catch(err){
    setSyncState('handover', 'error');
    showToast('刪除失敗：' + err.message);
  }
}

function renderHandover(rows){
  const tbody = document.getElementById('ho-tbody');
  if (!rows || rows.length === 0){
    tbody.innerHTML = '<tr class="empty-row"><td colspan="4">尚無資料</td></tr>';
    return;
  }
  tbody.innerHTML = rows.map(r => `
    <tr>
      <td class="mono-cell">${escapeHtml(r['日期'])}</td>
      <td>${escapeHtml(r['店家'])}</td>
      <td>${escapeHtml(r['交接事項'])}</td>
      <td class="col-del"><button class="btn btn-ghost" onclick="deleteHandover('${r['id']}')">✕</button></td>
    </tr>
  `).join('');
}

async function refreshHandover(){
  try{
    setSyncState('handover', 'loading');
    const rows = await apiGet('handover');
    renderHandover(rows);
    setSyncState('handover', 'synced');
    document.getElementById('ho-print-meta').textContent = `列印時間：${new Date().toLocaleString('zh-TW')}　共 ${rows.length} 筆`;
  }catch(err){
    setSyncState('handover', 'error');
  }
}

/* ---------------- 共用 ---------------- */

async function clearAll(type){
  var label = type === 'abnormal' ? '異常表' : '交接表';
  if (!confirm(`確定要刪除「${label}」的所有資料嗎？此動作無法復原。`)) return;
  if (!confirm(`再次確認：這會清空全部 ${label} 資料，確定要繼續嗎？`)) return;
  try{
    setSyncState(type, 'loading');
    await apiPost({ action: 'clearAll', type: type });
    showToast(`已刪除 ${label} 全部資料`);
    if (type === 'abnormal') await refreshAbnormal(); else await refreshHandover();
  }catch(err){
    setSyncState(type, 'error');
    showToast('刪除失敗：' + err.message);
  }
}

function chipClass(status){
  switch (status){
    case '換貨': return 'exchange';
    case '反應': return 'reaction';
    case '補貨': return 'restock';
    default: return 'return'; // 退貨
  }
}

function escapeHtml(v){
  if (v === undefined || v === null) return '';
  return String(v)
    .replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;')
    .replaceAll('"','&quot;').replaceAll("'",'&#39;');
}

function printPanel(type){
  // 印表前先更新一次列印時間戳記
  const meta = document.getElementById(type === 'abnormal' ? 'ab-print-meta' : 'ho-print-meta');
  meta.textContent = meta.textContent.replace(/列印時間：.*?　/, `列印時間：${new Date().toLocaleString('zh-TW')}　`);
  switchTab(type);
  setTimeout(() => window.print(), 50);
}

async function refreshAll(){
  await Promise.all([refreshAbnormal(), refreshHandover()]);
}

function startPolling(){
  if (pollTimer) clearInterval(pollTimer);
  pollTimer = setInterval(refreshAll, POLL_INTERVAL);
}

// 預設今天日期
document.getElementById('ab-date').valueAsDate = new Date();
document.getElementById('ho-date').valueAsDate = new Date();

refreshAll();
startPolling();
</script>
